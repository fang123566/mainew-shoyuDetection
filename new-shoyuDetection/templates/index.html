<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多类别手语识别与无障碍交流辅助系统</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --line: #d9e0ea;
            --text: #172033;
            --muted: #687385;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 14px 40px rgba(22, 32, 51, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            height: 64px;
            padding: 0 28px;
            background: #111827;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
        }

        .device {
            font-size: 13px;
            color: #d1d5db;
        }

        main {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
        }

        .panel-body { padding: 18px; }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab, button {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        button.primary:hover { background: var(--primary-dark); }
        button:disabled { opacity: 0.55; cursor: not-allowed; }

        .viewer {
            min-height: 540px;
            background: #0b1020;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .viewer img, .viewer canvas {
            max-width: 100%;
            max-height: 680px;
            display: block;
        }

        .placeholder {
            color: #aeb7c6;
            text-align: center;
            line-height: 1.8;
            padding: 40px;
        }

        .hidden-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .controls {
            display: grid;
            gap: 16px;
        }

        .control-group {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 14px;
        }

        input[type="range"] { width: 100%; }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            background: #f9fbff;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            background: #f9fbff;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #e8f0ff;
            color: var(--primary);
            font-weight: 700;
        }

        .sentence {
            margin-top: 16px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f9fbff;
            min-height: 52px;
            line-height: 1.7;
        }

        .log {
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
            min-height: 24px;
        }

        .ok { color: var(--success); }
        .err { color: var(--danger); }

        @media (max-width: 980px) {
            main { grid-template-columns: 1fr; }
            .viewer { min-height: 360px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">多类别手语识别与无障碍交流辅助系统</div>
        <div class="device" id="deviceInfo">模型加载中...</div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header">
                <div class="panel-title">检测画面</div>
                <div class="tabs">
                    <button class="tab active" id="imageTab" onclick="setMode('image')">图片检测</button>
                    <button class="tab" id="cameraTab" onclick="setMode('camera')">摄像头检测</button>
                </div>
            </div>
            <div class="panel-body">
                <div class="viewer">
                    <div class="placeholder" id="placeholder">
                        请选择图片或打开摄像头开始演示<br>
                        识别结果会显示英文标签、中文含义、置信度和检测框
                    </div>
                    <img id="resultImage" alt="检测结果" style="display:none;">
                    <video id="webcamVideo" class="hidden-video" autoplay playsinline muted></video>
                    <canvas id="webcamCanvas" style="display:none;"></canvas>
                </div>
                <div class="log" id="logText">等待操作。</div>
            </div>
        </section>

        <aside class="panel">
            <div class="panel-header">
                <div class="panel-title">控制与结果</div>
            </div>
            <div class="panel-body">
                <div class="controls">
                    <div class="control-group" id="imageControl">
                        <label>上传图片 <span>jpg / png / bmp</span></label>
                        <input type="file" id="imageInput" accept="image/*">
                    </div>

                    <div class="control-group">
                        <label>置信度阈值 <span id="confValue">0.50</span></label>
                        <input type="range" id="confSlider" min="0.05" max="0.95" step="0.05" value="0.50">
                    </div>

                    <div class="control-group">
                        <label>IoU 阈值 <span id="iouValue">0.45</span></label>
                        <input type="range" id="iouSlider" min="0.10" max="0.90" step="0.05" value="0.45">
                    </div>

                    <div class="button-row">
                        <button class="primary" id="detectBtn" onclick="runImageDetection()">开始检测</button>
                        <button id="cameraBtn" onclick="toggleCamera()" style="display:none;">打开摄像头</button>
                    </div>
                    <button onclick="saveResult()" id="saveBtn" disabled>保存当前结果</button>
                </div>

                <div class="stats" style="margin-top:18px;">
                    <div class="stat">
                        <div class="stat-value" id="countValue">0</div>
                        <div class="stat-label">目标数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="timeValue">--</div>
                        <div class="stat-label">耗时(s)</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="modeValue">图片</div>
                        <div class="stat-label">模式</div>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>英文</th>
                            <th>中文</th>
                            <th>置信度</th>
                        </tr>
                    </thead>
                    <tbody id="resultTable">
                        <tr><td colspan="4" style="text-align:center;color:var(--muted);">暂无检测结果</td></tr>
                    </tbody>
                </table>

                <div class="sentence">
                    <strong>简单短语：</strong>
                    <span id="sentenceText">等待连续识别...</span>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let mode = 'image';
        let selectedFile = null;
        let currentResult = null;
        let stream = null;
        let cameraRunning = false;
        let cameraTimer = null;
        let latestAnnotated = null;
        let latestAnnotatedAt = 0;
        const phraseHistory = [];

        const imageInput = document.getElementById('imageInput');
        const confSlider = document.getElementById('confSlider');
        const iouSlider = document.getElementById('iouSlider');
        const resultImage = document.getElementById('resultImage');
        const placeholder = document.getElementById('placeholder');
        const webcamVideo = document.getElementById('webcamVideo');
        const webcamCanvas = document.getElementById('webcamCanvas');
        const logText = document.getElementById('logText');

        window.addEventListener('DOMContentLoaded', async () => {
            imageInput.addEventListener('change', onImageSelected);
            confSlider.addEventListener('input', () => document.getElementById('confValue').textContent = Number(confSlider.value).toFixed(2));
            iouSlider.addEventListener('input', () => document.getElementById('iouValue').textContent = Number(iouSlider.value).toFixed(2));
            try {
                const res = await fetch('/model_info');
                const data = await res.json();
                document.getElementById('deviceInfo').textContent = `YOLOv11 | ${data.device === '0' ? 'GPU' : 'CPU'} | 35类`;
            } catch {
                document.getElementById('deviceInfo').textContent = '模型状态未知';
            }
        });

        function setMode(nextMode) {
            if (mode === nextMode) return;
            mode = nextMode;
            stopCamera();
            document.getElementById('imageTab').classList.toggle('active', mode === 'image');
            document.getElementById('cameraTab').classList.toggle('active', mode === 'camera');
            document.getElementById('imageControl').style.display = mode === 'image' ? 'grid' : 'none';
            document.getElementById('detectBtn').style.display = mode === 'image' ? 'block' : 'none';
            document.getElementById('cameraBtn').style.display = mode === 'camera' ? 'block' : 'none';
            document.getElementById('modeValue').textContent = mode === 'image' ? '图片' : '摄像头';
            resetDisplay();
        }

        function onImageSelected(event) {
            selectedFile = event.target.files[0] || null;
            if (!selectedFile) return;
            const reader = new FileReader();
            reader.onload = e => {
                placeholder.style.display = 'none';
                webcamCanvas.style.display = 'none';
                resultImage.style.display = 'block';
                resultImage.src = e.target.result;
            };
            reader.readAsDataURL(selectedFile);
            writeLog(`已选择图片：${selectedFile.name}`);
        }

        async function runImageDetection() {
            if (!selectedFile) {
                writeLog('请先选择一张图片。', true);
                return;
            }
            await detectBlob(selectedFile, true);
        }

        async function toggleCamera() {
            if (cameraRunning) {
                stopCamera();
                return;
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 960 }, height: { ideal: 720 }, facingMode: 'user' },
                    audio: false
                });
                webcamVideo.srcObject = stream;
                await webcamVideo.play();
                cameraRunning = true;
                document.getElementById('cameraBtn').textContent = '停止摄像头';
                placeholder.style.display = 'none';
                resultImage.style.display = 'none';
                webcamCanvas.style.display = 'block';
                startCameraLoop();
                writeLog('摄像头已开启，正在实时检测。');
            } catch (err) {
                writeLog(`无法打开摄像头：${err.message}`, true);
            }
        }

        function stopCamera() {
            cameraRunning = false;
            if (cameraTimer) clearTimeout(cameraTimer);
            cameraTimer = null;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            webcamVideo.srcObject = null;
            document.getElementById('cameraBtn').textContent = '打开摄像头';
        }

        function startCameraLoop() {
            const canvas = webcamCanvas;
            const ctx = canvas.getContext('2d');
            const draw = () => {
                if (!cameraRunning) return;
                canvas.width = webcamVideo.videoWidth || 640;
                canvas.height = webcamVideo.videoHeight || 480;
                if (latestAnnotated && Date.now() - latestAnnotatedAt < 650) {
                    ctx.drawImage(latestAnnotated, 0, 0, canvas.width, canvas.height);
                } else {
                    ctx.drawImage(webcamVideo, 0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(draw);
            };
            draw();
            scheduleCameraDetection();
        }

        function scheduleCameraDetection() {
            if (!cameraRunning) return;
            cameraTimer = setTimeout(async () => {
                const captureCanvas = document.createElement('canvas');
                captureCanvas.width = webcamVideo.videoWidth || 640;
                captureCanvas.height = webcamVideo.videoHeight || 480;
                captureCanvas.getContext('2d').drawImage(webcamVideo, 0, 0, captureCanvas.width, captureCanvas.height);
                captureCanvas.toBlob(async blob => {
                    if (blob) await detectBlob(blob, false);
                    scheduleCameraDetection();
                }, 'image/jpeg', 0.85);
            }, 650);
        }

        async function detectBlob(blob, updateImage) {
            const form = new FormData();
            form.append('image', blob, 'frame.jpg');
            form.append('conf', confSlider.value);
            form.append('iou', iouSlider.value);
            setBusy(true);
            try {
                const res = await fetch('/detect_image', { method: 'POST', body: form });
                const data = await res.json();
                if (!data.success) throw new Error(data.error || '检测失败');
                currentResult = data;
                if (updateImage) {
                    placeholder.style.display = 'none';
                    resultImage.style.display = 'block';
                    resultImage.src = data.result_image;
                } else {
                    const img = new Image();
                    img.onload = () => {
                        latestAnnotated = img;
                        latestAnnotatedAt = Date.now();
                    };
                    img.src = data.result_image;
                }
                displayResults(data);
                document.getElementById('saveBtn').disabled = false;
                writeLog(`检测完成：${data.count} 个目标，耗时 ${data.time}s`);
            } catch (err) {
                writeLog(err.message, true);
            } finally {
                setBusy(false);
            }
        }

        function displayResults(data) {
            document.getElementById('countValue').textContent = data.count;
            document.getElementById('timeValue').textContent = data.time ?? '--';
            const tbody = document.getElementById('resultTable');
            if (!data.detections || data.detections.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">未检测到目标</td></tr>';
                return;
            }
            tbody.innerHTML = data.detections.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td><span class="tag">${escapeHtml(d.class)}</span></td>
                    <td>${escapeHtml(d.class_cn)}</td>
                    <td>${d.confidence}%</td>
                </tr>
            `).join('');
            updatePhrase(data.detections[0]);
        }

        function updatePhrase(topDetection) {
            if (!topDetection || topDetection.confidence < 45) return;
            const word = topDetection.class_cn;
            const last = phraseHistory[phraseHistory.length - 1];
            if (last !== word) phraseHistory.push(word);
            while (phraseHistory.length > 6) phraseHistory.shift();
            document.getElementById('sentenceText').textContent = phraseHistory.join(' ');
        }

        async function saveResult() {
            if (!currentResult || !currentResult.result_path) return;
            const name = `detect_${Date.now()}.jpg`;
            try {
                const res = await fetch('/save_detect_result', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ result_path: currentResult.result_path, save_name: name })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error || '保存失败');
                writeLog(`结果已保存：${data.save_path}`);
            } catch (err) {
                writeLog(err.message, true);
            }
        }

        function resetDisplay() {
            resultImage.style.display = 'none';
            webcamCanvas.style.display = 'none';
            placeholder.style.display = 'block';
            currentResult = null;
            latestAnnotated = null;
            phraseHistory.length = 0;
            document.getElementById('sentenceText').textContent = '等待连续识别...';
            document.getElementById('countValue').textContent = '0';
            document.getElementById('timeValue').textContent = '--';
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('resultTable').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);">暂无检测结果</td></tr>';
        }

        function setBusy(isBusy) {
            document.getElementById('detectBtn').disabled = isBusy && mode === 'image';
        }

        function writeLog(message, isError = false) {
            logText.textContent = message;
            logText.className = `log ${isError ? 'err' : 'ok'}`;
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }
    </script>
</body>
</html>
